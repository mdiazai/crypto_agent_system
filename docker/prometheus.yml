global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "orchestrator"
    static_configs:
      - targets: ["orchestrator:8080"]

  - job_name: "discovery"
    static_configs:
      - targets: ["discovery:9100"]

  - job_name: "monitor"
    static_configs:
      - targets: ["monitor:9101"]

  - job_name: "detector"
    static_configs:
      - targets: ["detector:9102"]

  - job_name: "scorer"
    static_configs:
      - targets: ["scorer:9103"]

  - job_name: "executor"
    static_configs:
      - targets: ["executor:9104"]

  - job_name: "learner"
    static_configs:
      - targets: ["learner:9105"]

  - job_name: "dashboard"
    static_configs:
      - targets: ["dashboard:8001"]
